<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; min-height: 200px; display:flex; flex-direction:column; justify-content:center; gap: 12px; }
  .row { display:flex; align-items:baseline; gap:14px; }
  .lbl { font-family:var(--font-body); font-weight:900; font-size:9px; color:#555; text-transform:uppercase; letter-spacing:0.14em; width: 80px; flex-shrink:0; }
  .meta { font-family: var(--font-mono); font-size:9px; color:#555; margin-left: auto; }
  .eyebrow { font-family: var(--font-body); font-weight:900; font-size:10px; color:#f5c542; text-transform:uppercase; letter-spacing:0.12em; }
  .body { font-family: var(--font-body); font-weight:700; font-size:14px; color:#ccc; }
  .caption { font-family: var(--font-body); font-weight:700; font-size:12px; color:#888; text-transform:uppercase; letter-spacing:0.06em; }
  .micro { font-family: var(--font-body); font-weight:900; font-size:10px; color:#555; text-transform:uppercase; letter-spacing:0.12em; }
</style></head>
<body>
  <div class="row"><span class="lbl">Eyebrow</span><span class="eyebrow">Venue / Location</span><span class="meta">10px / 900 / gold / tracking 0.12em</span></div>
  <div class="row"><span class="lbl">Body</span><span class="body">Players don't need an account to join</span><span class="meta">14px / 700 / #ccc</span></div>
  <div class="row"><span class="lbl">Caption</span><span class="caption">Free to play · No account needed</span><span class="meta">12px / 700 / #888 / upper</span></div>
  <div class="row"><span class="lbl">Micro</span><span class="micro">Waiting for first call</span><span class="meta">10px / 900 / #555 / upper</span></div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; min-height: 160px; display:flex; align-items:center; justify-content:center; gap: 22px; flex-wrap:wrap; }
  .demo { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .box { width: 72px; height:72px; background: #1a1a1a; border:3px solid #111; }
  .s2 { box-shadow: 2px 2px 0 #111; }
  .s3 { box-shadow: 3px 3px 0 #111; }
  .s4 { box-shadow: 4px 4px 0 #111; }
  .s5 { box-shadow: 5px 5px 0 #111; }
  .s6 { box-shadow: 6px 6px 0 #111; }
  .lbl { font-family: var(--font-body); font-weight:900; font-size:10px; color:#888; text-transform:uppercase; letter-spacing:0.12em; }
  .v { font-family: var(--font-mono); font-size:9px; color:#555; font-weight:700; }
</style></head>
<body>
  <div class="demo"><div class="box s2"></div><div class="lbl">Chip</div><div class="v">2 × 2</div></div>
  <div class="demo"><div class="box s3"></div><div class="lbl">Card-Sm</div><div class="v">3 × 3</div></div>
  <div class="demo"><div class="box s4"></div><div class="lbl">Card</div><div class="v">4 × 4</div></div>
  <div class="demo"><div class="box s5"></div><div class="lbl">Card-Lg</div><div class="v">5 × 5</div></div>
  <div class="demo"><div class="box s6"></div><div class="lbl">Hero</div><div class="v">6 × 6</div></div>
</body></html>

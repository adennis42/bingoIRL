<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; min-height: 180px; display:flex; flex-direction:column; justify-content:center; gap: 10px; }
  .row { display:flex; align-items:baseline; gap:14px; }
  .lbl { font-family:var(--font-body); font-weight:900; font-size:9px; color:#555; text-transform:uppercase; letter-spacing:0.14em; width: 60px; flex-shrink:0; }
  .sample { font-family: var(--font-display); font-weight:900; color:#fff; text-transform:uppercase; letter-spacing:0.04em; text-shadow: 2px 2px 0 #111; line-height: 1; }
  .hero { font-size: 40px; text-shadow: 3px 3px 0 #111; }
  .h1 { font-size: 28px; text-shadow: 3px 3px 0 #111; }
  .h2 { font-size: 22px; }
  .h3 { font-size: 18px; letter-spacing: 0.06em; }
  .meta { font-family: var(--font-mono); font-size:9px; color:#555; margin-left: auto; }
</style></head>
<body>
  <div class="row"><span class="lbl">Hero</span><span class="sample hero">Let's Play</span><span class="meta">36–40px / 900 / shadow 3×3</span></div>
  <div class="row"><span class="lbl">H1</span><span class="sample h1">New Game</span><span class="meta">30px / 900 / shadow 3×3</span></div>
  <div class="row"><span class="lbl">H2</span><span class="sample h2">Round 3 Winner</span><span class="meta">24px / 900 / shadow 2×2</span></div>
  <div class="row"><span class="lbl">H3</span><span class="sample h3">Dashboard</span><span class="meta">20px / 900 / shadow 2×2</span></div>
</body></html>

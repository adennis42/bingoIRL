<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; min-height: 180px; display:flex; align-items:center; justify-content:center; gap: 18px; flex-wrap:wrap; }
  .ball { position: relative; perspective: 800px; }
  .b-inner { width: 100px; height:100px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    position: relative; }
  .oval { width: 54px; height:60px; border-radius:50%; background: rgba(255,255,255,0.96);
    display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow: inset 0 1px 3px rgba(0,0,0,0.15); }
  .col { font-family: var(--font-display); font-weight:900; font-size:14px; line-height:1; }
  .num { font-family: var(--font-mono); font-weight:900; font-size:30px; color:#111; line-height:1; margin-top: 2px; }
  .shine { position:absolute; top: 12px; left:18px; width: 28px; height:16px; border-radius:50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.55) 0%, transparent 80%); filter: blur(2px); transform: rotate(-20deg); }
  /* body styles per column */
  .blue   { background: radial-gradient(ellipse at 38% 32%, #4db8ff 0%, #4db8ffcc 45%, #4db8ff88 75%, #4db8ff55 100%); box-shadow: 0 6px 16px rgba(77,184,255,0.45), 0 4px 8px rgba(0,0,0,0.5), inset 0 3px 8px rgba(255,255,255,0.3), inset 0 -4px 10px rgba(0,0,0,0.35); }
  .red    { background: radial-gradient(ellipse at 38% 32%, #e84040 0%, #e84040cc 45%, #e8404088 75%, #e8404055 100%); box-shadow: 0 6px 16px rgba(232,64,64,0.45), 0 4px 8px rgba(0,0,0,0.5), inset 0 3px 8px rgba(255,255,255,0.3), inset 0 -4px 10px rgba(0,0,0,0.35); }
  .white  { background: radial-gradient(ellipse at 38% 32%, #ffffff 0%, #f0f0f0cc 45%, #cfcfcf88 75%, #aaaaaa55 100%); box-shadow: 0 6px 16px rgba(255,255,255,0.25), 0 4px 8px rgba(0,0,0,0.6), inset 0 3px 8px rgba(255,255,255,0.7), inset 0 -4px 10px rgba(0,0,0,0.25); }
  .green  { background: radial-gradient(ellipse at 38% 32%, #50e878 0%, #50e878cc 45%, #50e87888 75%, #50e87855 100%); box-shadow: 0 6px 16px rgba(80,232,120,0.45), 0 4px 8px rgba(0,0,0,0.5), inset 0 3px 8px rgba(255,255,255,0.3), inset 0 -4px 10px rgba(0,0,0,0.35); }
  .yellow { background: radial-gradient(ellipse at 38% 32%, #f5c542 0%, #f5c542cc 45%, #f5c54288 75%, #f5c54255 100%); box-shadow: 0 6px 16px rgba(245,197,66,0.45), 0 4px 8px rgba(0,0,0,0.5), inset 0 3px 8px rgba(255,255,255,0.3), inset 0 -4px 10px rgba(0,0,0,0.35); }
  .lbl { font-family: var(--font-body); font-weight:900; font-size:10px; color:#888; text-align:center; margin-top:10px; text-transform:uppercase; letter-spacing:0.12em; }
  .cell { display:flex; flex-direction:column; align-items:center; }
</style></head>
<body>
  <div class="cell"><div class="ball"><div class="b-inner blue"><div class="oval"><span class="col" style="color:#4db8ff">B</span><span class="num">7</span></div><div class="shine"></div></div></div><div class="lbl">B · Blue</div></div>
  <div class="cell"><div class="ball"><div class="b-inner red"><div class="oval"><span class="col" style="color:#e84040">I</span><span class="num">23</span></div><div class="shine"></div></div></div><div class="lbl">I · Red</div></div>
  <div class="cell"><div class="ball"><div class="b-inner white"><div class="oval"><span class="col" style="color:#888">N</span><span class="num">42</span></div><div class="shine"></div></div></div><div class="lbl">N · White</div></div>
  <div class="cell"><div class="ball"><div class="b-inner green"><div class="oval"><span class="col" style="color:#1a9933">G</span><span class="num">51</span></div><div class="shine"></div></div></div><div class="lbl">G · Green</div></div>
  <div class="cell"><div class="ball"><div class="b-inner yellow"><div class="oval"><span class="col" style="color:#c49200">O</span><span class="num">68</span></div><div class="shine"></div></div></div><div class="lbl">O · Yellow</div></div>
</body></html>

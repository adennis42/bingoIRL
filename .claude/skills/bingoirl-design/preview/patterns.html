<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; min-height: 200px; display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap; }
  .grid { display:grid; grid-template-columns: repeat(5, 34px); gap: 4px; }
  .cell { width:34px; height:34px; border:2px solid #111; background:#1e1e1e; }
  .hit { background: #f5c542; border-color:#111; box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -2px 0 #8a6600; }
  .c { background:#f5c542; }
  .panel { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .lbl { font-family: var(--font-body); font-weight:900; font-size:10px; color:#888; text-transform:uppercase; letter-spacing:0.14em; }
</style></head>
<body>
  <div class="panel"><div class="grid" id="line"></div><div class="lbl">Traditional Line</div></div>
  <div class="panel"><div class="grid" id="corners"></div><div class="lbl">Four Corners</div></div>
  <div class="panel"><div class="grid" id="blackout"></div><div class="lbl">Blackout</div></div>
  <div class="panel"><div class="grid" id="x"></div><div class="lbl">Custom · X</div></div>
<script>
  function make(id, cells) {
    const g = document.getElementById(id);
    for (let r=0;r<5;r++) for (let c=0;c<5;c++) {
      const d = document.createElement('div');
      d.className = 'cell';
      const isCenter = r===2 && c===2;
      if (cells.some(([rr,cc])=>rr===r&&cc===c) || isCenter) d.classList.add('hit');
      g.appendChild(d);
    }
  }
  make('line', [[2,0],[2,1],[2,2],[2,3],[2,4]]);
  make('corners', [[0,0],[0,4],[4,0],[4,4]]);
  const bo=[]; for(let r=0;r<5;r++)for(let c=0;c<5;c++)bo.push([r,c]); make('blackout', bo);
  make('x', [[0,0],[1,1],[3,3],[4,4],[0,4],[1,3],[3,1],[4,0]]);
</script>
</body></html>

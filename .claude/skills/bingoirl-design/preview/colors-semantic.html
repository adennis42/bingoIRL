<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; align-content:center; min-height: 140px; }
  .sw { display:flex; flex-direction:column; gap: 6px; }
  .chip { height: 64px; border:3px solid #111; box-shadow: 3px 3px 0 #111, var(--sheen-top);
    display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:900;
    color:#111; text-transform:uppercase; font-size:13px; letter-spacing:0.1em; }
  .lbl { font-family: var(--font-body); font-weight:900; font-size:10px; color:#888; text-transform:uppercase; letter-spacing: 0.12em; }
  .hint { font-family: var(--font-body); font-size:10px; color:#555; font-weight:700; }
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:var(--yellow-gradient);box-shadow:3px 3px 0 #111, var(--sheen-top), var(--sheen-bot-yellow)">Primary</div><div class="lbl">Primary</div><div class="hint">CTAs · Links</div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-gradient);box-shadow:3px 3px 0 #111, var(--sheen-top), var(--sheen-bot-blue)">Secondary</div><div class="lbl">Secondary</div><div class="hint">Join · Alt action</div></div>
  <div class="sw"><div class="chip" style="background:var(--green-gradient);box-shadow:3px 3px 0 #111, var(--sheen-top), var(--sheen-bot-green)">Success</div><div class="lbl">Success</div><div class="hint">Live · Confirm</div></div>
  <div class="sw"><div class="chip" style="background:var(--red-gradient);color:#fff;box-shadow:3px 3px 0 #111, var(--sheen-top-warm), var(--sheen-bot-red)">Danger</div><div class="lbl">Danger</div><div class="hint">Destructive · Error</div></div>
</body></html>

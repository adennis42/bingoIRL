<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px; align-content: center; min-height: 140px; }
  .sw { display:flex; flex-direction:column; gap: 6px; align-items:center; }
  .chip { width:100%; height:72px; border:3px solid #111; box-shadow: 3px 3px 0 #111, var(--sheen-top);
    display:flex; align-items:center; justify-content:center; font-family: var(--font-display);
    font-weight:900; font-size: 14px; color:#111; text-transform:uppercase; letter-spacing: 1px; }
  .bl { background: var(--blue-gradient); box-shadow: 3px 3px 0 #111, var(--sheen-top), var(--sheen-bot-blue); }
  .r { background: var(--red-gradient); color:#fff; box-shadow: 3px 3px 0 #111, var(--sheen-top-warm), var(--sheen-bot-red); }
  .w { background: linear-gradient(to bottom, #ffffff 0%, #f2f2f2 45%, #c4c4c4 100%); box-shadow: 3px 3px 0 #111, inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -3px 0 #999; }
  .gr { background: var(--green-gradient); box-shadow: 3px 3px 0 #111, var(--sheen-top), var(--sheen-bot-green); }
  .y { background: var(--yellow-gradient); box-shadow: 3px 3px 0 #111, var(--sheen-top), var(--sheen-bot-yellow); }
  .lbl { font-family: var(--font-body); font-weight:900; font-size:10px; color:#888; text-transform:uppercase; letter-spacing: 0.12em; }
  .hex { font-family: var(--font-mono); font-size:10px; color:#555; font-weight:700; }
</style></head>
<body>
  <div class="sw"><div class="chip bl">Blue</div><div class="lbl">B Column</div><div class="hex">#4DB8FF</div></div>
  <div class="sw"><div class="chip r">Red</div><div class="lbl">I Column</div><div class="hex">#E84040</div></div>
  <div class="sw"><div class="chip w">White</div><div class="lbl">N Column</div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="chip gr">Green</div><div class="lbl">G Column</div><div class="hex">#50E878</div></div>
  <div class="sw"><div class="chip y">Yellow</div><div class="lbl">O Column</div><div class="hex">#F5C542</div></div>
</body></html>

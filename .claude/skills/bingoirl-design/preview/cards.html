<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; min-height: 200px; display:flex; gap:14px; align-items:center; justify-content:center; flex-wrap:wrap; }
  .card { flex: 0 1 280px; background: #1a1a1a; border: 3px solid #111; box-shadow: 4px 4px 0 #111; padding: 18px; }
  .card .eyebrow { font-family:var(--font-body); font-weight:900; font-size:10px; color:#555; text-transform:uppercase; letter-spacing:0.14em; margin-bottom: 8px; }
  .card h3 { font-family: var(--font-display); font-weight:900; font-size: 18px; color:#fff; text-transform:uppercase; letter-spacing: 0.04em; text-shadow: 2px 2px 0 #111; margin-bottom: 4px; }
  .card p { font-family: var(--font-body); font-weight:700; font-size: 13px; color:#888; }
  .dep { background: #161616; box-shadow: 3px 3px 0 #111; opacity: 0.7; }
  .hero { background: #1a1a1a; box-shadow: 6px 6px 0 #111; }
</style></head>
<body>
  <div class="card"><div class="eyebrow">Card</div><h3>Regular Card</h3><p>Canonical recipe: #1a1a1a, 3px #111 border, 4×4 hard shadow.</p></div>
  <div class="card hero"><div class="eyebrow">Hero</div><h3>Hero Card</h3><p>Same border, 6×6 shadow for primary panels.</p></div>
  <div class="card dep"><div class="eyebrow">Deprioritized</div><h3>Past Game</h3><p>#161616 / 3×3 shadow / opacity 0.6–0.7.</p></div>
</body></html>

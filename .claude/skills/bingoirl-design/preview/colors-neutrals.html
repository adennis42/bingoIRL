<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; display:grid; grid-template-columns: repeat(6, 1fr); gap: 8px; align-content:center; min-height: 140px; }
  .sw { display:flex; flex-direction:column; gap: 5px; }
  .chip { height: 64px; border:3px solid #111; box-shadow: 3px 3px 0 #111; }
  .lbl { font-family: var(--font-body); font-weight:900; font-size:10px; color:#ccc; text-transform:uppercase; letter-spacing: 0.1em; }
  .hex { font-family: var(--font-mono); font-size:9px; color:#666; font-weight:700; }
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:#111"></div><div class="lbl">Page</div><div class="hex">#111111</div></div>
  <div class="sw"><div class="chip" style="background:#1a1a1a"></div><div class="lbl">Surface</div><div class="hex">#1A1A1A</div></div>
  <div class="sw"><div class="chip" style="background:#161616"></div><div class="lbl">Surface-Alt</div><div class="hex">#161616</div></div>
  <div class="sw"><div class="chip" style="background:#222"></div><div class="lbl">Input</div><div class="hex">#222222</div></div>
  <div class="sw"><div class="chip" style="background:#333"></div><div class="lbl">Disabled</div><div class="hex">#333333</div></div>
  <div class="sw"><div class="chip" style="background:#fff"></div><div class="lbl" style="color:#ccc">FG / White</div><div class="hex">#FFFFFF</div></div>
</body></html>

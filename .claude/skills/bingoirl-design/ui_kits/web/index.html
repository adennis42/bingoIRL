<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BingoIRL — Web UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { height: 100%; }
  #root { min-height: 100vh; background: #111; }
  .cel-btn-el:not(:disabled):hover {
    transform: translate(-1px, -1px);
    box-shadow: 6px 6px 0 #111, inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -2px 0 rgba(0,0,0,0.25) !important;
  }
  .cel-btn-el:not(:disabled):active {
    transform: translate(2px, 2px) !important;
    box-shadow: 1px 1px 0 #111, inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.2) !important;
  }
  @keyframes bingoBallSpin {
    0% { transform: rotateY(-90deg) scale(0.85); opacity: 0.5; }
    100% { transform: rotateY(0) scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="./CelButton.jsx"></script>
<script type="text/babel" src="./CelInput.jsx"></script>
<script type="text/babel" src="./CelCard.jsx"></script>
<script type="text/babel" src="./BingoLogo.jsx"></script>
<script type="text/babel" src="./BingoBall.jsx"></script>
<script type="text/babel" src="./StatusChip.jsx"></script>
<script type="text/babel" src="./GameCard.jsx"></script>
<script type="text/babel" src="./PatternVisualizer.jsx"></script>
<script type="text/babel" src="./Screens.jsx"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BingoIRL Logo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #111; display: flex; align-items: center; justify-content: center; min-height: 260px; font-family: 'DM Sans', sans-serif; }
  .logo { display: flex; align-items: flex-end; gap: 8px; }
  .tile { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center;
    font-family: 'Arial Black', Impact, sans-serif; font-size: 34px; font-weight: 900; color: #111;
    border: 3px solid #111; letter-spacing: -1px; }
  .b { background: linear-gradient(to bottom, #7dd4ff 0%, #4db8ff 45%, #1a80cc 100%); box-shadow: 4px 4px 0 #111, inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -3px 0 #004d99; }
  .i { background: linear-gradient(to bottom, #ff7070 0%, #e84040 45%, #991a1a 100%); color: #fff; box-shadow: 4px 4px 0 #111, inset 0 1px 0 rgba(255,255,255,0.35), inset 0 -3px 0 #660000; }
  .n { background: linear-gradient(to bottom, #ffffff 0%, #f2f2f2 45%, #c4c4c4 100%); box-shadow: 4px 4px 0 #111, inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -3px 0 #999999; }
  .g { background: linear-gradient(to bottom, #80ffaa 0%, #50e878 45%, #1a9933 100%); box-shadow: 4px 4px 0 #111, inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -3px 0 #005c1a; }
  .o { background: linear-gradient(to bottom, #ffe066 0%, #f5c542 45%, #c49200 100%); box-shadow: 4px 4px 0 #111, inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -3px 0 #8a6600; }
  .irl { font-family: 'Arial Black', Impact, sans-serif; font-size: 15px; font-weight: 900;
    letter-spacing: 3px; color: #fff; -webkit-text-stroke: 1.5px #111; paint-order: stroke fill;
    text-shadow: 2px 2px 0 #111; padding-bottom: 6px; padding-left: 4px; }
</style></head>
<body>
  <div class="logo">
    <div class="tile b">B</div>
    <div class="tile i">I</div>
    <div class="tile n">N</div>
    <div class="tile g">G</div>
    <div class="tile o">O</div>
    <div class="irl">IRL</div>
  </div>
</body>
</html>
